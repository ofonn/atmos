<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Atmos Proactive Weather Intelligence</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;family=Inter:wght@400;500&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "on-secondary-fixed": "#001a40",
              "secondary": "#acc7ff",
              "surface-container-high": "#272a33",
              "on-tertiary": "#0b315a",
              "primary-fixed-dim": "#c7bfff",
              "surface-container-highest": "#32343e",
              "surface-variant": "#32343e",
              "tertiary-container": "#7492c1",
              "on-secondary-container": "#cedcff",
              "outline-variant": "#474554",
              "inverse-primary": "#5b47d1",
              "background": "#10131c",
              "on-primary-fixed-variant": "#4329b8",
              "surface-container": "#1c1f28",
              "on-secondary": "#002f67",
              "error": "#ffb4ab",
              "error-container": "#93000a",
              "on-primary-fixed": "#180065",
              "surface-tint": "#c7bfff",
              "primary-container": "#8f7fff",
              "outline": "#928ea0",
              "on-surface": "#e0e2ee",
              "on-secondary-fixed-variant": "#004591",
              "on-primary": "#2b009e",
              "on-error": "#690005",
              "tertiary-fixed-dim": "#a9c8fa",
              "secondary-fixed": "#d7e2ff",
              "on-tertiary-container": "#002a53",
              "primary": "#c7bfff",
              "on-tertiary-fixed": "#001c3a",
              "on-surface-variant": "#c9c4d6",
              "secondary-container": "#005ec2",
              "tertiary": "#a9c8fa",
              "primary-fixed": "#e5deff",
              "surface": "#10131c",
              "inverse-surface": "#e0e2ee",
              "on-background": "#e0e2ee",
              "surface-dim": "#10131c",
              "surface-bright": "#363943",
              "on-error-container": "#ffdad6",
              "surface-container-low": "#181b24",
              "inverse-on-surface": "#2d303a",
              "tertiary-fixed": "#d4e3ff",
              "surface-container-lowest": "#0b0e16",
              "secondary-fixed-dim": "#acc7ff",
              "on-tertiary-fixed-variant": "#274872",
              "on-primary-container": "#25008c"
            },
            fontFamily: {
              "headline": ["Plus Jakarta Sans"],
              "body": ["Plus Jakarta Sans"],
              "label": ["Inter"]
            },
            borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
      .bg-atmospheric-glow {
        background: radial-gradient(circle at 50% -20%, #4329b8 0%, #10131c 70%);
      }
      .sun-glow {
        filter: drop-shadow(0 0 40px rgba(199, 191, 255, 0.4));
      }
      .glass-input {
        background: rgba(39, 42, 51, 0.4);
        backdrop-filter: blur(24px);
        border: 0.5px solid rgba(146, 142, 160, 0.2);
      }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface font-body selection:bg-primary/30 min-h-screen overflow-hidden flex flex-col items-center justify-between">
<!-- Top Navigation Bar (Shared Component Strategy) -->
<header class="bg-[#10131c] dark:bg-[#10131c] w-full top-0 px-6 py-4 flex justify-between items-center w-full max-w-screen-xl mx-auto z-50">
<div class="flex items-center gap-2 text-[#c7bfff] font-plus-jakarta-sans text-sm font-medium tracking-tight">
<span class="material-symbols-outlined text-lg" data-icon="location_on">location_on</span>
<span>London, UK</span>
</div>
<div class="h-10 w-10 rounded-full overflow-hidden hover:opacity-80 transition-opacity cursor-pointer">
<img class="w-full h-full object-cover" data-alt="User profile avatar close up photo" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCx7QkMPC9v-ht8Wf6ox1sfNCyaQlhkYzE6-9ZUOOWvC6E2XKAIiJYEAP_cdoKVAyoN6U1J8VTykqXwDqVX3xB7lgo0NzbF359nRDl1NuUyNqEofKuAj2wuT5GRhq-YmnEso3kh8xT3WHVajT2NWVesnn1d0oj_BBndSStIoLNCAqka8b94ceEbhu5_ocWcCFIXjEGfcVf_wi9boSt7F-Kk3fAoZbR1-sgZHIyA3LsOnZMNa4sgbY17qHNRGrOkjF4j-JmjyX5RdBq4"/>
</div>
</header>
<!-- Main Content Canvas -->
<main class="flex-1 w-full max-w-screen-xl mx-auto px-6 flex flex-col justify-center relative bg-atmospheric-glow">
<!-- Section 1: 3D Weather State & Metrics -->
<section class="flex items-center gap-8 mb-12 translate-y-[-2rem]">
<div class="relative w-40 h-40 flex items-center justify-center sun-glow">
<!-- Representing a high-gloss volumetric 3D sun -->
<div class="absolute inset-0 bg-gradient-to-br from-[#FFD700] via-[#FFA500] to-[#806EF8] rounded-full opacity-80 blur-xl"></div>
<div class="relative w-32 h-32 bg-gradient-to-tr from-[#FFF7CC] to-[#FFA500] rounded-full shadow-[inset_-10px_-10px_30px_rgba(0,0,0,0.2),0_10px_40px_rgba(255,165,0,0.4)]">
<div class="absolute top-4 left-6 w-12 h-6 bg-white/40 blur-md rounded-full rotate-[-30deg]"></div>
</div>
</div>
<div class="flex flex-col">
<span class="font-headline text-[5rem] font-bold leading-none tracking-tighter text-on-surface">34°C</span>
<span class="font-label text-on-surface-variant text-lg tracking-tight mt-2 opacity-80">Feels like 38°C</span>
</div>
</section>
<!-- Section 2 & 3: Editorial Headline & Subtext -->
<section class="max-w-4xl">
<h1 class="font-headline text-[6rem] md:text-[8rem] font-extrabold leading-[0.9] tracking-tighter text-on-surface mb-8">
                It's going to be <span class="text-transparent bg-clip-text bg-gradient-to-br from-primary to-secondary">hot today.</span>
</h1>
<p class="font-body text-xl md:text-2xl text-on-surface-variant max-w-2xl leading-relaxed opacity-70">
                Stay hydrated and seek shade during peak hours.
            </p>
</section>
<!-- Section 4: AI Proactive Input Bar -->
<div class="mt-20 w-full max-w-xl">
<div class="glass-input rounded-full p-2 pl-6 flex items-center gap-4 group transition-all duration-300 focus-within:ring-2 focus-within:ring-primary/40">
<span class="material-symbols-outlined text-primary" data-icon="sparkles">colors_spark</span>
<input class="bg-transparent border-none focus:ring-0 text-on-surface placeholder:text-on-surface-variant/50 w-full font-body py-3" placeholder="Ask Atmos..." type="text"/>
<button class="bg-gradient-to-br from-primary to-secondary text-on-primary-container px-6 py-3 rounded-full font-bold text-sm tracking-wide hover:opacity-90 active:scale-95 transition-all">
                    ASK
                </button>
</div>
</div>
</main>
<!-- Section 5: Interaction Indicator -->
<footer class="w-full pb-12 flex flex-col items-center gap-4">
<div class="flex flex-col items-center gap-2 group cursor-pointer">
<div class="w-12 h-1 bg-on-surface-variant/20 rounded-full overflow-hidden relative">
<div class="absolute inset-0 bg-on-surface-variant/40 translate-x-[-100%] group-hover:translate-x-[100%] transition-transform duration-1000 ease-in-out"></div>
</div>
<span class="font-label text-[10px] uppercase tracking-[0.3em] text-on-surface-variant/60">Swipe for details</span>
</div>
</footer>
<!-- Bottom Navigation Bar (Shared Component Strategy - Hidden for focused home screen per logic) -->
<div class="fixed bottom-0 w-full flex justify-center pb-8 z-50">
<nav class="bg-[#181b24]/80 backdrop-blur-xl fixed bottom-6 left-1/2 -translate-x-1/2 rounded-full px-8 py-3 shadow-[0_20px_50px_rgba(0,0,0,0.3)] flex gap-10 items-center no-border glassmorphism-edge-highlight">
<button class="text-[#c7bfff] scale-110 flex items-center justify-center transition-transform active:scale-90 tap-highlight-none" title="Dashboard">
<span class="material-symbols-outlined" data-icon="dashboard" style="font-variation-settings: 'FILL' 1;">dashboard</span>
</button>
<button class="text-[#5d5e66] flex items-center justify-center hover:text-[#acc7ff] transition-colors active:scale-90 tap-highlight-none" title="Explore">
<span class="material-symbols-outlined" data-icon="explore">explore</span>
</button>
<button class="text-[#5d5e66] flex items-center justify-center hover:text-[#acc7ff] transition-colors active:scale-90 tap-highlight-none" title="Settings">
<span class="material-symbols-outlined" data-icon="settings">settings</span>
</button>
</nav>
</div>
</body></html>
